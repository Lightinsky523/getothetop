<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学生分享 - 志愿填报参考</title>
  <style>
    :root {
      --bg: #f8f7f4;
      --bg-elevated: #ffffff;
      --accent: #1a1a1a;
      --accent-muted: #4a5568;
      --text: #1a1a1a;
      --text-soft: #5f6b7a;
      --border-subtle: #e2e4e8;
      --error: #c53030;
      --radius: 8px;
      --radius-lg: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, sans-serif;
      color: var(--text);
      background: #f0ede8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .app-shell {
      width: 100%;
      max-width: 1400px;
      background: #fffef9;
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .app-inner { position: relative; z-index: 1; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand { display: flex; align-items: center; gap: 10px; }

    .logo {
      width: 42px; height: 42px; border-radius: var(--radius);
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      color: #fffef9; font-weight: 600; font-size: 18px; text-decoration: none;
    }

    .title-block h1 { margin: 0; font-size: 24px; font-weight: 600; letter-spacing: 0.02em; }
    .title-block p { margin: 4px 0 0; font-size: 14px; color: var(--text-soft); }

    .nav-tabs {
      display: inline-flex; gap: 2px; padding: 2px;
      background: #f0ede8; border-radius: var(--radius);
    }

    .nav-tab {
      border: none; background: transparent; color: var(--text-soft);
      padding: 8px 16px; border-radius: 6px; font-size: 13px;
      cursor: pointer; text-decoration: none; transition: all 0.15s;
    }

    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { background: #fffef9; color: var(--text); box-shadow: var(--shadow); }

    .nav-tab.admin-link {
      background: var(--accent); color: #fffef9; margin-left: 2px;
    }
    .nav-tab.admin-link:hover { opacity: 0.9; }

    .main-content {
      background: #fffef9; border-radius: var(--radius-lg);
      padding: 24px; border: 1px solid var(--border-subtle);
    }

    .section-title {
      font-size: 18px; font-weight: 600;
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }

    .section-title .icon-pill {
      width: 20px; height: 20px; border-radius: 4px;
      background: var(--accent); color: #fffef9;
      display: flex; align-items: center; justify-content: center; font-size: 11px;
    }

    .section-desc { margin: 4px 0 20px; font-size: 13px; color: var(--text-soft); }

    /* 搜索栏 */
    .search-bar {
      display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap;
    }

    .input, .select {
      border-radius: var(--radius); border: 1px solid var(--border-subtle);
      background: #fff; padding: 11px 12px; color: var(--text); font-size: 14px;
      outline: none;
    }

    .input:focus, .select:focus { border-color: var(--accent); }
    .input { flex: 1; min-width: 200px; }
    .select { min-width: 150px; }

    .primary-btn {
      border: 1px solid var(--accent); border-radius: var(--radius);
      padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
      background: var(--accent); color: #fffef9; display: inline-flex;
      align-items: center; gap: 6px;
    }

    .primary-btn:hover { opacity: 0.9; }
    .primary-btn.secondary { background: transparent; color: var(--accent); }

    /* 上传表单 */
    .upload-section {
      background: #f8f7f4; border-radius: var(--radius);
      padding: 20px; border: 1px solid var(--border-subtle);
      margin-bottom: 24px;
    }

    .form-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    }

    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

    .textarea {
      width: 100%; border-radius: var(--radius); border: 1px solid var(--border-subtle);
      background: #fff; padding: 11px 12px; color: var(--text); font-size: 14px;
      outline: none; resize: vertical; font-family: inherit; min-height: 120px;
    }

    .textarea:focus { border-color: var(--accent); }

    /* 图片上传 */
    .image-upload {
      margin-top: 12px;
    }

    .image-upload-label {
      display: block; font-size: 14px; color: var(--text-soft); margin-bottom: 8px;
    }

    .image-input-wrapper {
      position: relative; display: inline-block;
    }

    .image-input-wrapper input[type="file"] {
      position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer;
    }

    .image-upload-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border: 1px dashed var(--border-subtle);
      border-radius: var(--radius); background: #fff; color: var(--text-soft);
      font-size: 13px; cursor: pointer;
    }

    .image-upload-btn:hover { border-color: var(--accent); color: var(--text); }

    .image-preview-grid {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px;
    }

    .image-preview {
      position: relative; width: 100px; height: 100px;
      border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border-subtle);
    }

    .image-preview img {
      width: 100%; height: 100%; object-fit: cover;
    }

    .image-preview .remove-btn {
      position: absolute; top: 2px; right: 2px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--error); color: #fff; border: none;
      font-size: 12px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }

    /* 分享列表 */
    .share-list {
      display: flex; flex-direction: column; gap: 16px;
    }

    .share-card {
      background: #f8f7f4; border-radius: var(--radius);
      padding: 20px; border: 1px solid var(--border-subtle);
      transition: all 0.2s;
    }

    .share-card:hover { border-color: var(--accent); box-shadow: var(--shadow); }

    .share-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 12px;
    }

    .share-meta {
      display: flex; align-items: center; gap: 10px;
    }

    .share-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600;
    }

    .share-author h4 { margin: 0; font-size: 14px; font-weight: 600; }
    .share-author p { margin: 2px 0 0; font-size: 12px; color: var(--text-soft); }

    .share-school-tag {
      font-size: 11px; padding: 4px 8px; border-radius: 4px;
      background: #fef3c7; color: #92400e; border: 1px solid #fcd34d;
    }

    .share-content {
      font-size: 14px; line-height: 1.7; color: var(--text-soft);
      margin-bottom: 12px;
    }

    .share-images {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
    }

    .share-image {
      width: 120px; height: 120px; border-radius: var(--radius);
      overflow: hidden; border: 1px solid var(--border-subtle); cursor: pointer;
    }

    .share-image img { width: 100%; height: 100%; object-fit: cover; }

    .share-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
    }

    .tag {
      font-size: 11px; padding: 3px 8px; border-radius: 4px;
      border: 1px solid var(--border-subtle); color: var(--text-soft); background: #fff;
    }

    .share-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--border-subtle); font-size: 12px; color: var(--text-soft);
    }

    /* 评论区域 */
    .share-comments {
      margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border-subtle);
    }
    .comment-item {
      padding: 8px 0; font-size: 13px; color: var(--text);
      border-bottom: 1px solid #f0ede8;
    }
    .comment-item:last-child { border-bottom: none; }
    .comment-author { font-size: 12px; color: var(--text-soft); margin-bottom: 4px; }
    .comment-form {
      margin-top: 12px; display: flex; gap: 8px; align-items: flex-start;
    }
    .comment-form .input { flex: 1; min-height: 36px; }
    .comment-form .primary-btn { flex-shrink: 0; }

    .loading {
      text-align: center; padding: 60px 20px; color: var(--text-soft);
    }

    .empty-state {
      text-align: center; padding: 40px 20px; color: var(--text-soft);
    }

    /* 图片查看模态框 */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center;
    }

    .modal.show { display: flex; }

    .modal img { max-width: 90%; max-height: 90%; border-radius: var(--radius); }

    .modal-close {
      position: absolute; top: 20px; right: 20px;
      width: 40px; height: 40px; border-radius: 50%;
      background: #fff; border: none; font-size: 20px; cursor: pointer;
    }

    /* 切换按钮 */
    .section-toggle {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
    }

    .pill-switch { display: inline-flex; gap: 2px; padding: 2px; background: #f0ede8; border-radius: var(--radius); }
    .pill-switch button { border: none; background: transparent; color: var(--text-soft); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .pill-switch button.active { background: #fffef9; color: var(--text); box-shadow: var(--shadow); }

    .form-section { display: none; }
    .form-section.active { display: block; }

    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: var(--radius); color: #fff; font-size: 14px; z-index: 2000; display: none; }
    .toast.show { display: block; }
    .toast.success { background: #38a169; }
    .toast.error { background: var(--error); }

    @media (max-width: 900px) {
      .app-shell { border-radius: 24px; padding: 20px 16px; }
      .header { flex-direction: column; align-items: flex-start; }
      .search-bar { flex-direction: column; }
      .input, .select { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="app-inner">
      <header class="header">
        <div class="brand">
          <a href="index.html" class="logo">志</a>
          <div class="title-block">
            <h1>学生分享</h1>
            <p>学长学姐的真实经历</p>
          </div>
        </div>
        <nav class="nav-tabs">
          <a href="index.html" class="nav-tab">志愿填报</a>
          <a href="major-info.html" class="nav-tab">专业院校信息概览</a>
          <a href="student-shares.html" class="nav-tab active">学生分享</a>
          <a href="admin.html" class="nav-tab admin-link" onclick="return checkAdminAccess()">管理者通道</a>
        </nav>
      </header>

      <div class="main-content">
        <div class="section-title">
          <span class="icon-pill">享</span>
          学生分享
        </div>
        <p class="section-desc">
          阅读在读学生的真实分享，了解他们的学习经历。完成信息认证后，可使用学校邮箱发帖与评论。
        </p>

        <!-- 信息认证（未认证时显示） -->
        <div id="verification-panel" class="upload-section" style="display: none;">
          <div class="section-title">
            <span class="icon-pill">验</span>
            信息认证
          </div>
          <p class="section-desc">请使用学校邮箱（.edu 或 .edu.cn 结尾）完成认证，认证通过后才可发帖与评论。</p>
          <div id="verify-step1" class="form-grid" style="margin-bottom: 12px;">
            <input type="email" class="input" id="verify-email" placeholder="学校邮箱，如 xxx@pku.edu.cn" style="grid-column: 1 / -1;" />
            <button class="primary-btn" id="send-code-btn" onclick="sendVerifyCode()">发送验证码</button>
            <button class="primary-btn secondary" onclick="document.getElementById('verification-panel').style.display='none'">取消</button>
          </div>
          <div id="verify-step2" style="display: none;">
            <p style="font-size: 13px; color: var(--text-soft); margin-bottom: 8px;">验证码已发送，识别学校：<strong id="verify-school-name"></strong></p>
            <div class="form-grid" style="margin-bottom: 12px;">
              <input type="text" class="input" id="verify-code" placeholder="输入6位验证码" maxlength="6" style="max-width: 160px;" />
              <button class="primary-btn" onclick="doVerify()">确认认证</button>
              <button class="primary-btn secondary" onclick="resetVerifyStep()">重新发送</button>
            </div>
          </div>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
          <input type="text" class="input" id="search-keyword" placeholder="搜索学校、专业或关键词..." />
          <select class="select" id="search-school">
            <option value="">全部学校</option>
          </select>
          <select class="select" id="search-major">
            <option value="">全部专业</option>
          </select>
          <button class="primary-btn" onclick="searchShares()">搜索</button>
          <button class="primary-btn secondary" onclick="toggleUploadForm()">+ 写分享</button>
          <span id="auth-badge" style="display: none; font-size: 12px; color: var(--text-soft); margin-left: 8px;">已认证：<strong id="auth-school"></strong></span>
        </div>

        <!-- 上传表单 -->
        <div id="upload-form" class="upload-section" style="display: none;">
          <div class="section-title">
            <span class="icon-pill">写</span>
            分享你的经历
          </div>
          <p class="section-desc">您只能在认证学校下发帖。选择专业，匿名分享你的真实经历（支持上传图片）。</p>
          
          <div class="form-grid">
            <input type="text" class="input" id="upload-school" readonly placeholder="认证学校（自动填入）" style="background: #f8f7f4; cursor: not-allowed;" />
            <select class="select" id="upload-major">
              <option value="">选择专业</option>
            </select>
            <select class="select" id="upload-grade">
              <option value="">年级（选填）</option>
              <option value="大一">大一</option>
              <option value="大二">大二</option>
              <option value="大三">大三</option>
              <option value="大四">大四</option>
              <option value="研一">研一</option>
              <option value="研二">研二</option>
              <option value="研三">研三</option>
            </select>
            <input type="text" class="input" id="upload-title" placeholder="分享标题" />
          </div>
          
          <textarea class="textarea" id="upload-content" placeholder="写下你的真实经历、学习感受、经验教训..." style="margin-top: 12px;"></textarea>
          
          <!-- 图片上传 -->
          <div class="image-upload">
            <label class="image-upload-label">上传图片（最多5张）</label>
            <div class="image-input-wrapper">
              <input type="file" id="upload-images" accept="image/*" multiple onchange="handleImageSelect(event)" />
              <div class="image-upload-btn">
                <span>📷</span> 选择图片
              </div>
            </div>
            <div class="image-preview-grid" id="image-preview-grid"></div>
          </div>
          
          <input type="text" class="input" id="upload-tags" placeholder="标签，用逗号分隔（如：学习方法,竞赛经历,实习经验）" style="margin-top: 12px;" />
          
          <div style="margin-top: 16px; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 12px; color: var(--text-soft);">无需实名，保护隐私</span>
            <div>
              <button class="primary-btn secondary" onclick="toggleUploadForm()" style="margin-right: 8px;">取消</button>
              <button class="primary-btn" onclick="submitShare()">提交分享</button>
            </div>
          </div>
        </div>

        <!-- 分享列表 -->
        <div class="share-list" id="share-list">
          <div class="loading">正在加载分享...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 图片查看模态框 -->
  <div class="modal" id="image-modal" onclick="closeModal()">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <img id="modal-image" src="" alt="预览" />
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = '';
    let selectedImages = [];
    let allShares = [];
    let schoolsData = [];
    let majorsData = [];
    let authToken = localStorage.getItem('authToken') || '';
    let verifiedSchool = localStorage.getItem('verifiedSchool') || '';

    // 检查管理员权限
    function checkAdminAccess() {
      const password = prompt('请输入管理员密码：');
      if (password === 'a~a~ycyzword+') {
        sessionStorage.setItem('adminAuth', 'true');
        return true;
      } else if (password !== null) {
        alert('密码错误！');
      }
      return false;
    }

    // 切换上传表单
    function toggleUploadForm() {
      const form = document.getElementById('upload-form');
      const verifyPanel = document.getElementById('verification-panel');
      if (!authToken || !verifiedSchool) {
        verifyPanel.style.display = verifyPanel.style.display === 'none' ? 'block' : 'none';
        form.style.display = 'none';
        return;
      }
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
      verifyPanel.style.display = 'none';
      if (form.style.display === 'block') {
        document.getElementById('upload-school').value = verifiedSchool;
        loadMajorsForSchool(verifiedSchool);
      }
    }

    // 信息认证：发送验证码
    async function sendVerifyCode() {
      const email = document.getElementById('verify-email').value.trim().toLowerCase();
      if (!email) {
        showToast('请输入学校邮箱', 'error');
        return;
      }
      const suffix = (email.split('@')[1] || '');
      if (!suffix.endsWith('.edu') && !suffix.endsWith('.edu.cn')) {
        showToast('请使用学校邮箱（.edu 或 .edu.cn 结尾）', 'error');
        return;
      }
      const btn = document.getElementById('send-code-btn');
      btn.disabled = true;
      try {
        const res = await fetch(API_BASE + '/api/auth/send-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.code === 200) {
          showToast(data.msg, 'success');
          document.getElementById('verify-school-name').textContent = data.school || '未知';
          document.getElementById('verify-step2').style.display = 'block';
          if (data.vc) {
            document.getElementById('verify-code').value = data.vc;
            document.getElementById('verify-code').placeholder = '验证码已预填（测试模式）';
          }
          btn.disabled = false;
        } else {
          showToast(data.msg || '发送失败', 'error');
          btn.disabled = false;
        }
      } catch (e) {
        showToast('网络错误', 'error');
        btn.disabled = false;
      }
    }

    // 信息认证：确认验证
    async function doVerify() {
      const email = document.getElementById('verify-email').value.trim().toLowerCase();
      const code = document.getElementById('verify-code').value.trim();
      if (!email || !code) {
        showToast('请输入邮箱和验证码', 'error');
        return;
      }
      try {
        const res = await fetch(API_BASE + '/api/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code })
        });
        const data = await res.json();
        if (data.code === 200) {
          authToken = data.authToken;
          verifiedSchool = data.school || '';
          localStorage.setItem('authToken', authToken);
          localStorage.setItem('verifiedSchool', verifiedSchool);
          showToast('认证成功，可在认证学校下发帖', 'success');
          document.getElementById('verification-panel').style.display = 'none';
          document.getElementById('auth-badge').style.display = 'inline';
          document.getElementById('auth-school').textContent = verifiedSchool;
          toggleUploadForm();
        } else {
          showToast(data.msg || '验证失败', 'error');
        }
      } catch (e) {
        showToast('网络错误', 'error');
      }
    }

    function resetVerifyStep() {
      document.getElementById('verify-step2').style.display = 'none';
      document.getElementById('verify-code').value = '';
    }

    // 加载学校选项
    async function loadSchoolOptions() {
      try {
        const res = await fetch(API_BASE + '/api/schools');
        const data = await res.json();
        if (data.code === 200) {
          schoolsData = data.data;
          const searchSchoolSelect = document.getElementById('search-school');
          searchSchoolSelect.innerHTML = '<option value="">全部学校</option>';
          data.data.forEach(school => {
            const option = document.createElement('option');
            option.value = school.school_name;
            option.textContent = school.school_name;
            searchSchoolSelect.appendChild(option);
          });
        }
      } catch (err) {
        console.error('加载学校列表失败:', err);
      }
    }

    // 为指定学校加载专业（认证后发帖用）
    async function loadMajorsForSchool(schoolName) {
      const majorSelect = document.getElementById('upload-major');
      majorSelect.innerHTML = '<option value="">选择专业</option>';
      if (!schoolName) return;
      try {
        const res = await fetch(API_BASE + '/api/schools/' + encodeURIComponent(schoolName) + '/majors');
        const data = await res.json();
        if (data.code === 200 && data.data) {
          data.data.forEach(major => {
            const option = document.createElement('option');
            option.value = major.major_name;
            option.textContent = major.major_name;
            majorSelect.appendChild(option);
          });
        }
      } catch (err) {
        console.error('加载专业列表失败:', err);
      }
    }

    // 加载专业选项（用于搜索）
    async function loadMajorOptions() {
      try {
        const res = await fetch(API_BASE + '/api/majors');
        const data = await res.json();
        if (data.code === 200) {
          majorsData = data.data;
          const searchMajorSelect = document.getElementById('search-major');
          searchMajorSelect.innerHTML = '<option value="">全部专业</option>';
          
          data.data.forEach(major => {
            const option = document.createElement('option');
            option.value = major.major_name;
            option.textContent = major.major_name;
            searchMajorSelect.appendChild(option);
          });
        }
      } catch (err) {
        console.error('加载专业列表失败:', err);
      }
    }

    // 处理图片选择
    function handleImageSelect(event) {
      const files = event.target.files;
      if (!files.length) return;
      
      if (selectedImages.length + files.length > 5) {
        showToast('最多只能上传5张图片', 'error');
        return;
      }
      
      Array.from(files).forEach(file => {
        if (file.size > 5 * 1024 * 1024) {
          showToast('单张图片不能超过5MB', 'error');
          return;
        }
        
        const reader = new FileReader();
        reader.onload = (e) => {
          selectedImages.push({
            file: file,
            preview: e.target.result
          });
          renderImagePreviews();
        };
        reader.readAsDataURL(file);
      });
    }

    // 渲染图片预览
    function renderImagePreviews() {
      const grid = document.getElementById('image-preview-grid');
      grid.innerHTML = selectedImages.map((img, index) => `
        <div class="image-preview">
          <img src="${img.preview}" alt="预览" />
          <button class="remove-btn" onclick="removeImage(${index})">&times;</button>
        </div>
      `).join('');
    }

    // 移除图片
    function removeImage(index) {
      selectedImages.splice(index, 1);
      renderImagePreviews();
    }

    // 提交分享
    async function submitShare() {
      const school = document.getElementById('upload-school').value;
      const major = document.getElementById('upload-major').value;
      const grade = document.getElementById('upload-grade').value;
      const title = document.getElementById('upload-title').value.trim();
      const content = document.getElementById('upload-content').value.trim();
      const tags = document.getElementById('upload-tags').value.trim();

      if (!school || !major) {
        showToast('请选择学校和专业', 'error');
        return;
      }

      if (!title || !content) {
        showToast('请填写标题和内容', 'error');
        return;
      }

      // 准备图片数据
      const imageData = selectedImages.map(img => img.preview);

      const data = {
        school,
        major,
        grade: grade || '未知年级',
        title,
        content,
        tags: tags || '',
        images: imageData,
        authToken
      };

      try {
        const res = await fetch(API_BASE + '/api/student-shares', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        
        if (result.code === 200) {
          showToast('分享提交成功！', 'success');
          // 清空表单
          document.getElementById('upload-school').value = '';
          document.getElementById('upload-major').value = '';
          document.getElementById('upload-grade').value = '';
          document.getElementById('upload-title').value = '';
          document.getElementById('upload-content').value = '';
          document.getElementById('upload-tags').value = '';
          selectedImages = [];
          renderImagePreviews();
          toggleUploadForm();
          // 刷新列表
          loadShares();
        } else {
          showToast('提交失败：' + result.msg, 'error');
        }
      } catch (err) {
        console.error('提交失败:', err);
        showToast('网络错误，请稍后重试', 'error');
      }
    }

    // 加载分享列表
    async function loadShares() {
      try {
        const res = await fetch(API_BASE + '/api/student-shares');
        const data = await res.json();
        
        if (data.code === 200) {
          allShares = data.data;
          renderShares(allShares);
        } else {
          document.getElementById('share-list').innerHTML = '<div class="empty-state">暂无分享数据</div>';
        }
      } catch (err) {
        console.error('加载分享失败:', err);
        document.getElementById('share-list').innerHTML = '<div class="empty-state">加载失败，请稍后重试</div>';
      }
    }

    // 渲染分享列表
    function renderShares(shares) {
      const list = document.getElementById('share-list');
      
      if (shares.length === 0) {
        list.innerHTML = '<div class="empty-state">暂无符合条件的分享</div>';
        return;
      }
      
      const IMAGE_SEP = '|||IMAGE_SEP|||';
      list.innerHTML = shares.map(share => {
        const imageList = share.images ? share.images.split(IMAGE_SEP).filter(img => img.trim()) : [];
        const imagesHtml = imageList.map((img) => {
          const safe = (img || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          return `<div class="share-image" onclick="showImageModal(this)" data-src="${safe}"><img alt="分享图片" /></div>`;
        }).join('');
        
        const tagsHtml = share.tags ? share.tags.split(/[,，]/).filter(t => t.trim()).map(tag => `
          <span class="tag">${tag.trim()}</span>
        `).join('') : '';
        
        const firstChar = share.school ? share.school.charAt(0) : '分';
        
        return `
          <div class="share-card">
            <div class="share-header">
              <div class="share-meta">
                <div class="share-avatar">${firstChar}</div>
                <div class="share-author">
                  <h4>${share.school}</h4>
                  <p>${share.major} · ${share.grade || '未知年级'}</p>
                </div>
              </div>
              <span class="share-school-tag">在读分享</span>
            </div>
            <h3 style="font-size: 15px; font-weight: 600; margin: 0 0 10px 0;">${share.title || '无标题'}</h3>
            <div class="share-content">${share.content}</div>
            ${imagesHtml ? `<div class="share-images">${imagesHtml}</div>` : ''}
            ${tagsHtml ? `<div class="share-tags">${tagsHtml}</div>` : ''}
            <div class="share-footer">
              <span>${formatDate(share.upload_time)}</span>
            </div>
            <div class="share-comments" id="comments-${share.id}">
              <div class="comment-list-${share.id}"></div>
              <div class="comment-form" id="comment-form-${share.id}">
                <input type="text" class="input" id="comment-input-${share.id}" placeholder="发表评论（需信息认证）" />
                <button class="primary-btn" onclick="submitComment(${share.id})">评论</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
      list.querySelectorAll('.share-image').forEach(div => {
        const src = div.getAttribute('data-src');
        if (src) div.querySelector('img').src = src;
      });
      shares.forEach(share => loadComments(share.id));
    }

    // 加载评论
    async function loadComments(shareId) {
      const list = document.querySelector('.comment-list-' + shareId);
      if (!list) return;
      try {
        const res = await fetch(API_BASE + '/api/student-shares/' + shareId + '/comments');
        const data = await res.json();
        if (data.code === 200 && data.data && data.data.length > 0) {
          list.innerHTML = data.data.map(c => `
            <div class="comment-item">
              <div class="comment-author">${escapeHtml(c.school_name)} · ${formatDate(c.created_at)}</div>
              <div>${escapeHtml(c.content)}</div>
            </div>
          `).join('');
        }
      } catch (e) {}
    }

    function escapeHtml(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // 发表评论
    async function submitComment(shareId) {
      if (!authToken) {
        showToast('请先完成信息认证（点击「写分享」进行认证）', 'error');
        return;
      }
      const input = document.getElementById('comment-input-' + shareId);
      const content = (input && input.value || '').trim();
      if (!content) {
        showToast('请输入评论内容', 'error');
        return;
      }
      try {
        const res = await fetch(API_BASE + '/api/student-shares/' + shareId + '/comments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content, authToken })
        });
        const data = await res.json();
        if (data.code === 200) {
          showToast('评论成功', 'success');
          input.value = '';
          loadComments(shareId);
        } else {
          showToast(data.msg || '评论失败', 'error');
        }
      } catch (e) {
        showToast('网络错误', 'error');
      }
    }

    // 搜索分享
    function searchShares() {
      const keyword = document.getElementById('search-keyword').value.trim().toLowerCase();
      const school = document.getElementById('search-school').value;
      const major = document.getElementById('search-major').value;
      
      let filtered = allShares;
      
      if (keyword) {
        filtered = filtered.filter(s => 
          (s.title && s.title.toLowerCase().includes(keyword)) ||
          (s.content && s.content.toLowerCase().includes(keyword)) ||
          (s.tags && s.tags.toLowerCase().includes(keyword))
        );
      }
      
      if (school) {
        filtered = filtered.filter(s => s.school === school);
      }
      
      if (major) {
        filtered = filtered.filter(s => s.major === major);
      }
      
      renderShares(filtered);
    }

    // 显示图片模态框（传入被点击的元素，从 data-src 取图）
    function showImageModal(el) {
      const src = el && el.getAttribute ? el.getAttribute('data-src') : el;
      if (src) document.getElementById('modal-image').src = src;
      document.getElementById('image-modal').classList.add('show');
    }

    // 关闭模态框
    function closeModal() {
      document.getElementById('image-modal').classList.remove('show');
    }

    // 格式化日期
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toLocaleDateString('zh-CN');
    }

    // 显示提示
    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // 回车搜索
    document.getElementById('search-keyword').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') searchShares();
    });

    // 页面加载
    window.onload = function() {
      loadShares();
      loadSchoolOptions();
      loadMajorOptions();
      if (authToken && verifiedSchool) {
        document.getElementById('auth-badge').style.display = 'inline';
        document.getElementById('auth-school').textContent = verifiedSchool;
      }
    };
  </script>
</body>
</html>
