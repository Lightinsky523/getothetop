<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>开设院校 - 志愿填报参考</title>
    <style>
      :root {
        --bg: #f8f7f4;
        --bg-elevated: #ffffff;
        --accent: #1a1a1a;
        --accent-muted: #4a5568;
        --text: #1a1a1a;
        --text-soft: #5f6b7a;
        --border-subtle: #e2e4e8;
        --error: #c53030;
        --radius: 8px;
        --radius-lg: 12px;
        --shadow: 0 1px 3px rgba(0,0,0,0.06);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, sans-serif;
        color: var(--text);
        background: #f0ede8;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
      }

      .app-shell {
        width: 100%;
        max-width: 1400px;
        background: #fffef9;
        border-radius: var(--radius-lg);
        padding: 36px 32px;
        border: 1px solid var(--border-subtle);
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }

      .app-inner {
        position: relative;
        z-index: 1;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
        gap: 16px;
        flex-wrap: wrap;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo {
        width: 42px;
        height: 42px;
        border-radius: var(--radius);
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fffef9;
        font-weight: 600;
        font-size: 18px;
        text-decoration: none;
      }

      .title-block h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .title-block p {
        margin: 4px 0 0;
        font-size: 14px;
        color: var(--text-soft);
      }

      .nav-tabs {
        display: inline-flex;
        gap: 2px;
        padding: 2px;
        background: #f0ede8;
        border-radius: var(--radius);
      }

      .nav-tab {
        border: none;
        background: transparent;
        color: var(--text-soft);
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s;
      }

      .nav-tab:hover { color: var(--text); }

      .nav-tab.active {
        background: #fffef9;
        color: var(--text);
        box-shadow: var(--shadow);
      }

      .admin-link {
        margin-left: 8px; padding: 6px 12px; background: var(--accent);
        color: #fffef9; border-radius: 4px; font-size: 12px;
        text-decoration: none; cursor: pointer;
      }

      .main-content {
        background: #fffef9;
        border-radius: var(--radius-lg);
        padding: 24px;
        border: 1px solid var(--border-subtle);
      }

      .section-title {
        font-size: 18px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .section-title .icon-pill {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        background: var(--accent);
        color: #fffef9;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
      }

      .section-desc {
        margin: 4px 0 20px;
        font-size: 13px;
        color: var(--text-soft);
      }

      .search-filters {
        display: flex;
        gap: 10px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .input, .select {
        border-radius: var(--radius);
        border: 1px solid var(--border-subtle);
        background: #fff;
        padding: 11px 12px;
        color: var(--text);
        font-size: 14px;
        outline: none;
      }

      .input:focus, .select:focus { border-color: var(--accent); }

      .input { flex: 1; min-width: 200px; }
      .select { min-width: 150px; }

      .primary-btn {
        border: 1px solid var(--accent);
        border-radius: var(--radius);
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        background: var(--accent);
        color: #fffef9;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .school-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .school-card {
        background: #f8f7f4;
        border-radius: var(--radius);
        padding: 20px;
        border: 1px solid var(--border-subtle);
      }

      .school-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
      }

      .school-name {
        font-size: 16px;
        font-weight: 600;
        margin: 0;
      }

      .school-tags {
        display: flex;
        gap: 6px;
      }

      .tag {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 4px;
        border: 1px solid var(--border-subtle);
        color: var(--text-soft);
        background: #fff;
      }

      .tag.highlight {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .school-info {
        font-size: 13px;
        color: var(--text-soft);
        margin-bottom: 16px;
      }

      .curriculum-section {
        background: #fff;
        border-radius: var(--radius);
        padding: 12px;
        margin-top: 12px;
      }

      .curriculum-title {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 8px 0;
      }

      .course-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .course-tag {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 4px;
        background: #f0ede8;
        color: var(--text-soft);
      }

      .divider {
        height: 1px;
        background: var(--border-subtle);
        margin: 12px 0;
      }

      .stream-info {
        font-size: 12px;
        color: var(--text-soft);
      }

      .stream-info strong {
        color: var(--text);
      }

      .loading {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-soft);
      }

      @media (max-width: 900px) {
        .app-shell {
          border-radius: 24px;
          padding: 20px 16px;
        }
        .header {
          flex-direction: column;
          align-items: flex-start;
        }
        .search-filters {
          flex-direction: column;
        }
        .input, .select {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <div class="app-inner">
        <header class="header">
          <div class="brand">
            <a href="index.html" class="logo">志</a>
            <div class="title-block">
              <h1>开设院校</h1>
              <p>院校培养计划与课程设置</p>
            </div>
          </div>
          <nav class="nav-tabs">
            <a href="index.html" class="nav-tab">志愿填报</a>
            <a href="major-overview.html" class="nav-tab">专业概览</a>
            <a href="major-schools.html" class="nav-tab active">开设院校</a>
            <a href="major-students.html" class="nav-tab">学生分享</a>
          </nav>
            <a href="admin.html" class="admin-link" onclick="return checkAdminAccess()">管理者通道</a>
        </header>

        <div class="main-content">
          <div class="section-title">
            <span class="icon-pill">校</span>
            开设院校教学信息
          </div>
          <p class="section-desc">
            了解各院校的专业培养计划、课程设置和大类分流情况，帮助你做出更明智的选择。
          </p>

          <div class="search-filters">
            <input type="text" class="input" id="school-search" placeholder="搜索院校或专业..." />
            <select class="select" id="major-filter">
              <option value="">全部专业</option>
              <option value="cs">计算机类</option>
              <option value="medicine">医学类</option>
              <option value="finance">金融经济类</option>
              <option value="engineering">工科类</option>
              <option value="arts">人文社科类</option>
            </select>
            <select class="select" id="level-filter">
              <option value="">全部层次</option>
              <option value="985">985高校</option>
              <option value="211">211高校</option>
              <option value="double-first">双一流</option>
              <option value="province">省属重点</option>
            </select>
            <button class="primary-btn" onclick="searchSchools()">搜索</button>
          </div>

          <div class="major-select-section" style="margin-bottom: 20px;">
            <label style="font-size: 14px; color: var(--text-soft); margin-bottom: 8px; display: block;">选择专业查看开设院校</label>
            <select class="select" id="major-select" style="width: 100%; max-width: 400px;" onchange="loadPrograms()">
              <option value="">请先选择专业</option>
            </select>
          </div>

          <div class="school-list" id="school-list">
            <div class="loading" id="loading">请选择专业查看开设院校</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = '';

      // 加载专业列表到下拉框
      async function loadMajorOptions() {
        try {
          const res = await fetch(API_BASE + '/api/majors');
          const data = await res.json();
          if (data.code === 200) {
            const select = document.getElementById('major-select');
            data.data.forEach(m => {
              const option = document.createElement('option');
              option.value = m.id;
              option.textContent = m.major_name;
              select.appendChild(option);
            });
          }
        } catch (err) {
          console.error('加载专业列表失败:', err);
        }
      }

      // 加载选中专业的开设院校
      async function loadPrograms() {
        const majorId = document.getElementById('major-select').value;
        const list = document.getElementById('school-list');
        
        if (!majorId) {
          list.innerHTML = '<div class="loading">请选择专业查看开设院校</div>';
          return;
        }
        
        list.innerHTML = '<div class="loading">正在加载...</div>';
        
        try {
          const res = await fetch(API_BASE + '/api/majors/' + majorId);
          const data = await res.json();
          if (data.code === 200) {
            const major = data.data;
            const programs = major.programs || [];
            
            if (programs.length === 0) {
              list.innerHTML = '<div class="loading">该专业暂无开设院校数据，请前往管理后台添加</div>';
              return;
            }
            
            list.innerHTML = programs.map(p => `
              <div class="school-card">
                <div class="school-header">
                  <h3 class="school-name">${p.school_name} - ${major.major_name}</h3>
                  <div class="school-tags">
                    ${p.school_level ? `<span class="tag highlight">${p.school_level}</span>` : ''}
                  </div>
                </div>
                <div class="school-info">
                  ${p.location || '暂无位置信息'} | ${p.tuition_fee || '学费信息暂无'}
                </div>
                ${p.program_features ? `
                <div class="curriculum-section">
                  <div class="curriculum-title">专业特色</div>
                  <p style="margin: 0; font-size: 13px; color: var(--text-soft);">${p.program_features}</p>
                </div>
                ` : ''}
                ${p.courses ? `
                <div class="curriculum-section">
                  <div class="curriculum-title">开设课程</div>
                  <div class="course-list">
                    ${p.courses.split(/[,，]/).map(c => `<span class="course-tag">${c.trim()}</span>`).join('')}
                  </div>
                </div>
                ` : ''}
                ${p.admission_requirements ? `
                <div class="divider"></div>
                <div class="stream-info">
                  <strong>招生要求：</strong>${p.admission_requirements}
                </div>
                ` : ''}
                ${p.scholarships ? `
                <div class="stream-info">
                  <strong>奖学金：</strong>${p.scholarships}
                </div>
                ` : ''}
                ${p.contact_info ? `
                <div class="stream-info">
                  <strong>联系方式：</strong>${p.contact_info}
                </div>
                ` : ''}
              </div>
            `).join('');
          }
        } catch (err) {
          list.innerHTML = '<div class="loading">加载失败，请稍后重试</div>';
        }
      }

      function searchSchools() {
        const keyword = document.getElementById('school-search').value.trim();
        const major = document.getElementById('major-filter').value;
        const level = document.getElementById('level-filter').value;
        
        alert('搜索功能：\n关键词：' + (keyword || '无') + 
              '\n专业：' + (major || '全部') + 
              '\n层次：' + (level || '全部') + 
              '\n\n请使用上方"选择专业"下拉框查看具体专业的开设院校。');
      }

      // 回车搜索
      document.getElementById('school-search').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchSchools();
      });

      function checkAdminAccess() {
        const password = prompt('请输入管理员密码：');
        if (password === 'a~a~ycyzword+') {
          sessionStorage.setItem('adminAuth', 'true');
          return true;
        } else if (password !== null) {
          alert('密码错误！');
        }
        return false;
      }

      // 页面加载时获取专业列表
      loadMajorOptions();
    </script>
  </body>
</html>
